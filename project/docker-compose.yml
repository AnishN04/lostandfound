version: '3.8'

services:
  backend:
    image: ${BACKEND_IMAGE:-lost-and-found-backend}:latest
    ports:
      - "5003:5003"
    environment:
      - NODE_ENV=production
      - PORT=5003
      - MONGO_URI=mongodb://mongo:27017/lostandfound
    depends_on:
      - mongo
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app-network

  frontend:
    image: ${FRONTEND_IMAGE:-lost-and-found-frontend}:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - prometheus-config:/etc/prometheus/
    ports:
      - "9090:9090"
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  prometheus-config:
    external: true
